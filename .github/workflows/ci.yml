name: ejemplo-recuperacion-contrasena-ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tooling
        run: python -m pip install --upgrade pip coverage

      - name: Run unit, functional and integration tests
        run: coverage run -m unittest discover -s tests -v

      - name: Show coverage report
        run: coverage report -m

      - name: Export coverage xml
        run: coverage xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

